name: e2e

on:
  push:
    branches: [main]
  pull_request:

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers (chromium)
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_EMAIL: ${{ secrets.VAPID_EMAIL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

      - name: Start server
        run: |
          npm run start -- --port 3000 &
          npx wait-on http://127.0.0.1:3000/login

      - name: Run Playwright tests
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_EMAIL: ${{ secrets.VAPID_EMAIL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          PLAYWRIGHT_BASE_URL: ${{ secrets.PLAYWRIGHT_BASE_URL }}
          TEST_USER_DENEYAP_EMAIL: ${{ secrets.TEST_USER_DENEYAP_EMAIL }}
          TEST_USER_DENEYAP_PASSWORD: ${{ secrets.TEST_USER_DENEYAP_PASSWORD }}
          TEST_USER_BOLGE_EMAIL: ${{ secrets.TEST_USER_BOLGE_EMAIL }}
          TEST_USER_BOLGE_PASSWORD: ${{ secrets.TEST_USER_BOLGE_PASSWORD }}
          TEST_USER_KOORD_EMAIL: ${{ secrets.TEST_USER_KOORD_EMAIL }}
          TEST_USER_KOORD_PASSWORD: ${{ secrets.TEST_USER_KOORD_PASSWORD }}
          TEST_USER_MUHASEBE_EMAIL: ${{ secrets.TEST_USER_MUHASEBE_EMAIL }}
          TEST_USER_MUHASEBE_PASSWORD: ${{ secrets.TEST_USER_MUHASEBE_PASSWORD }}
        run: npx playwright test

      - name: Upload Playwright report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

